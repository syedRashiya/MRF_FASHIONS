<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | MRF FASHIONS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav>
        <div class="container">
            <a href="index.html" class="logo">MRF FASHIONS</a>
        </div>
    </nav>

    <section style="height: 100vh; display: flex; align-items: center; text-align: center;">
        <div class="container">
            <div style="font-size: 5rem; color: var(--primary); margin-bottom: 2rem;">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h1 id="thank-you-title" style="font-size: 3.5rem; margin-bottom: 1.5rem;">Thank You</h1>
            <p id="thank-you-msg"
                style="font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto 3rem;">
                Your request has been received. Our team will contact you shortly to confirm the details.
            </p>
            <a href="index.html" class="btn btn-primary">Return to Home</a>
        </div>
    </section>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const title = document.getElementById('thank-you-title');
        const msg = document.getElementById('thank-you-msg');

        if (type === 'booking') {
            title.innerText = 'Appointment Confirmed';
            msg.innerText = "We've notified our agents. A confirmation email has been sent to your inbox. We'll see you at the scheduled time!";
        } else if (type === 'order') {
            title.innerText = 'Order Received';
            msg.innerText = "Thank you for supporting artisanal craft. Your treasures are being prepared and will be shipped within 48 hours.";
        }
    </script>
</body>

</html>
